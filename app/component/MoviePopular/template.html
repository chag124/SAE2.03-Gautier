<div class="popular-card" onclick="C.handlerDetail('{{id}}')">
  <img src="../server/images/{{image}}" alt="affiche film" class="popular-card_image">
  <div class="popular-card_container">
    <div class="popular-card_content">
      <span class="badge">POPULAIRE</span>
      <h2 class="popular-card_title">{{name}}</h2>
      <p class="popular-card_description">{{description}}</p>
    </div>
  </div>
</div>

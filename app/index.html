<!DOCTYPE html>
<html lang="fr">
  <head>
    <title>SAE2.03 APP</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/base.css" />
  </head>

  <body>
    <header id="header"></header>
    <section id="content"></section>

    <script type="module">
      import { NavBar } from "./component/NavBar/script.js";
      import { Movie } from "./component/Movie/script.js";
      import { MovieCategory } from "./component/MovieCategory/script.js";
      import { DataMovie } from "./data/dataMovie.js";
      import { MovieDetail } from "./component/MovieDetail/script.js";
      import { dataProfile } from "./data/dataProfile.js";
      import { dataFavorite } from "./data/dataFavorite.js";
      import { MoviePopular } from "./component/MoviePopular/script.js";

      // Controleur
      // Rappel, écrire window.C plutôt que let C est nécessaire pour tester depuis la console du navigateur
      // Une fois l'application terminée, on pourrait remettre let C.
      window.C = {};

      /*variables pour l'état de l'application*/
      window.activeProfile = null;
      window.allProfiles = [];
      window.allCategories = [];
      window.favorites = [];


      C.handlerAbout = function () {
        alert(
          "Ceci est une base de projet pour la SAE2.03 édition 2025. Bonne chance !"
        );
      };

      /*fonction pour ajouter un film en favoris*/
      C.handlerAddFavorite = async function(id_movie){
        if (window.activeProfile == null){
          alert("Veuillez sélectionner un profil");
          return;
        }
        await dataFavorite.add(window.activeProfile.id, id_movie);
        alert("Film ajouté aux favoris:"); 
        C.handlerHome();     
      }

      /*fonction pour afficher les favoris*/
      C.handlerShowFavorites = async function(){
        if (window.activeProfile == null){
          alert("Veuillez sélectionner un profil pour voir vos favoris");
          return;
        }
        window.favorites = await dataFavorite.read(window.activeProfile.id);
        V.renderFavorites(window.favorites);
      }

      /*fonction pour supprimer un film des favoris*/
      C.handlerDeleteFavorite = async function(id_movie){
        if (window.activeProfile == null){
          alert("Veuillez sélectionner un profil");
          return;
        }
        await dataFavorite.delete(window.activeProfile.id, id_movie);
        alert("Film supprimé des favoris"); 
        
        C.handlerShowFavorites();
      }

      /*fonction pour afficher les détails du film*/
      C.handlerDetail = async function(id){
        const movie = await DataMovie.requestMovieDetails(id);
        if (movie){
          V.renderMovieDetail(movie);
        } else {
          alert("Les détails du film ne chargent pas")
        }
      };

      /*fonction pour revenir à la liste des films*/
      C.handlerHome = async function () {
      let ageLimite = 0;

      if (window.activeProfile != null) {
        ageLimite = window.activeProfile.age_restriction;
        window.favorites = await dataFavorite.read(window.activeProfile.id);
      }

      const data = await DataMovie.requestMovies(ageLimite);
      const popularData = await DataMovie.requestPopularMovies(ageLimite);

      window.allCategories = Object.keys(data);
      V.renderNavBar("C.handlerAbout()", "C.handlerHome()", window.allCategories, window.allProfiles, window.activeProfile);

      V.renderHomePage(popularData, data);
    };

      /*fonction pour le menu déroulant NavBar*/
      C.handlerCategoryChange = function(categoryName){
        V.renderOneCategory(categoryName);
      }

      /*fonction pour afficher les profils*/
      C.handlerChangeProfile = function (id, name){
        let fullProfile = null;

        for (let i=0; i<window.allProfiles.length; i++){
          if (window.allProfiles[i].id == id){
            fullProfile = window.allProfiles[i];
            break;
          }
        }
        window.activeProfile = fullProfile;

        V.renderNavBar("C.handlerAbout()", "C.handlerHome()", window.allCategories, window.allProfiles, window.activeProfile);

        C.handlerHome();
      }

      C.start = async function () {
        window.allProfiles = await dataProfile.read();
        const data = await DataMovie.requestMovies(0);
        const popularData = await DataMovie.requestPopularMovies(0); 
        
        window.allCategories = Object.keys(data);

        V.renderNavBar("C.handlerAbout()", "C.handlerHome()", window.allCategories, window.allProfiles, window.activeProfile);
        V.renderHomePage(popularData, data); 
    };

      // Vue (contient tout ce qui est relatif à l'affichage)
      window.V = {};

      /**
       * V.renderNavBar
       *
       * Cette fonction est responsable de l'affichage de la barre de navigation (NavBar).
       * Elle sélectionne l'élément HTML avec l'ID "header" et y insère le contenu
       * formaté par le composant NavBar.
       */
      V.renderNavBar = function (hAbout, hHome, categories, profiles, activeProfile) {
        let header = document.querySelector("#header");
        header.innerHTML = NavBar.format(hAbout,hHome, categories, profiles, activeProfile);
      };

      /*fonction pour afficher la page d'accueil avec les films populaires et les catégories de films*/
      V.renderHomePage = function(popularData, categoryData) {
        let content = document.querySelector("#content");
        let html = "";
        html += MoviePopular.format(popularData);

        if (Object.keys(categoryData).length == 0){
            html += "Aucun film disponible pour votre tranche d'âge.";
        } else {
            for (const categoryName in categoryData){
                html += MovieCategory.format(categoryName, categoryData[categoryName]);
            }
        }
        content.innerHTML = html;
      };

      V.renderMovieDetail = function (movie) {
        let content = document.querySelector("#content");
        content.innerHTML = MovieDetail.format(movie);
      };

      V.renderMoviesByCategory = function(data){
        let content = document.querySelector("#content");
        let html = "";

        for (const categoryName in  data){
          html += MovieCategory.format(categoryName, data[categoryName]);
        }
        content.innerHTML = html;
      };

      V.renderOneCategory = async function (categoryName){
        const data = await DataMovie.requestMovies();
        let content = document.querySelector("#content");
        if (data[categoryName]){
          content.innerHTML = MovieCategory.format (categoryName, data [categoryName]);
        }
      }

      V.renderFavorites = function (favorites){
        let content = document.querySelector("#content");
        content.innerHTML = MovieCategory.format("Mes favoris", favorites);
       }

      C.start(); // Démarre l'application

    </script>
  </body>
</html>
<script type="module"></script>

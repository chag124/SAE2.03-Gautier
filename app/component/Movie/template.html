<div class="movie-card" onclick="C.handlerDetail('{{id}}')">
  <img src="../server/images/{{image}}" alt="affiche film" class="movie-card_images">
  <div class="movie-card_content">
    <h3 class="movie-card_title">{{name}}</h3>
    <img class="movie-card_button" onclick="C.handlerAddFavorite('{{id}}')" src="../server/images/icone.png" alt="Ajouter aux favoris">
  </div>
</div>
